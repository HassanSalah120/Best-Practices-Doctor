schema_version: 2
framework: laravel
description: >
  Project-aware Laravel context matrix used to resolve business context, architecture
  profile, technical capabilities, team expectations, and rule calibration in one connected system.

project_types:
  saas_platform:
    label: SaaS Platform
    description: Subscription/business account platform with plans, billing, and quotas.
    detection_signals:
      structural:
        - subscriptions_dir
        - billing_services
      heuristic:
        - plan_quota_terms
        - trial_lifecycle_terms

  internal_admin_system:
    label: Internal Admin System
    description: Internal operational dashboard without broad public surface area.
    detection_signals:
      structural:
        - admin_controllers
        - admin_routes
      heuristic:
        - admin_only_terms
        - low_public_route_density

  clinic_erp_management:
    label: Clinic / ERP / Management
    description: Workflow-heavy business operations for appointments, claims, invoicing, and staff.
    detection_signals:
      structural:
        - patient_models
        - appointment_or_claim_modules
      heuristic:
        - clinic_erp_terms
        - workflow_orchestration_terms

  api_backend:
    label: API Backend
    description: Primarily API delivery and JSON contracts.
    detection_signals:
      structural:
        - api_routes_weighted
        - resources_dir
      heuristic:
        - json_response_dominant
        - token_auth_usage

  realtime_game_control_platform:
    label: Realtime / Game / Control
    description: Event-driven, websocket-heavy control loops and state synchronization.
    detection_signals:
      structural:
        - websocket_server
        - broadcast_events
      heuristic:
        - game_or_realtime_terms
        - state_sync_terms

  public_website_with_dashboard:
    label: Public Website + Dashboard
    description: Marketing/public pages plus authenticated dashboard/admin areas.
    detection_signals:
      structural:
        - web_public_routes
        - authenticated_dashboard_routes
      heuristic:
        - marketing_pages_and_dashboard

  portal_based_business_app:
    label: Portal-based Business App
    description: Distinct user role portals with bounded access rules.
    detection_signals:
      structural:
        - portal_routes
        - policy_classes
      heuristic:
        - role_portal_terms
        - admin_staff_customer_split

profiles:
  mvc:
    label: Classic MVC
    description: Controller-centric Laravel application with light service abstraction.
    defaults:
      controller_strictness: moderate
      boundary_strictness: moderate
    detection_signals:
      structural:
        - controllers
        - models
        - requests
      heuristic:
        - mixed_controller_queries
        - minimal_service_layer

  layered:
    label: Layered Laravel
    description: Controller -> service/action -> repository/model boundaries are expected.
    defaults:
      controller_strictness: high
      boundary_strictness: high
    detection_signals:
      structural:
        - actions
        - services
        - repositories
        - providers
      heuristic:
        - controller_delegation
        - orchestration_services

  modular:
    label: Modular / Domain
    description: Feature or domain grouped boundaries with local module services.
    defaults:
      controller_strictness: high
      boundary_strictness: high
    detection_signals:
      structural:
        - modules_dir
        - domains_dir
      heuristic:
        - feature_first_backend_layout
        - module_local_actions

  api-first:
    label: API-First
    description: Token-authenticated JSON APIs and resource response consistency.
    defaults:
      controller_strictness: high
      boundary_strictness: high
    detection_signals:
      structural:
        - api_routes_weighted
        - resources_dir
      heuristic:
        - json_response_dominant
        - token_auth_usage

capabilities:
  multi_tenant:
    label: Multi-tenant
    description: Tenant-scoped data boundaries and tenant-aware middleware.
    detection_signals:
      structural:
        - tenant_scope_class
        - tenant_middleware
      heuristic:
        - tenant_id_columns
        - clinic_id_columns

  saas:
    label: SaaS / Subscription
    description: Plans, quotas, subscriptions, trial/cancel/resume lifecycle.
    detection_signals:
      structural:
        - subscription_models
        - billing_services
      heuristic:
        - plan_quota_terms
        - trial_terms

  realtime:
    label: Realtime / WebSockets
    description: Broadcast events, socket auth boundaries, realtime orchestration.
    detection_signals:
      structural:
        - should_broadcast
        - broadcast_config
      heuristic:
        - websocket_service_names
        - echo_event_channels

  billing:
    label: Billing / Payments
    description: Payment provider integration and billing lifecycle logic.
    detection_signals:
      structural:
        - payment_services
        - payment_callbacks
      heuristic:
        - stripe_terms
        - cashier_terms
        - paymob_terms

  multi_role_portal:
    label: Multi-role Portal
    description: Distinct access boundaries for admin/staff/customer portals.
    detection_signals:
      structural:
        - policy_classes
        - role_middleware
      heuristic:
        - role_enum_terms
        - portal_route_groups

  queue_heavy:
    label: Queue-heavy
    description: Significant job/event orchestration and retry discipline.
    detection_signals:
      structural:
        - jobs_dir
        - listeners_dir
      heuristic:
        - dispatch_usage_high
        - queue_connection_terms

  mixed_public_dashboard:
    label: Public site + Dashboard
    description: Public pages coexist with authenticated portal/admin surfaces.
    detection_signals:
      structural:
        - web_public_routes
        - authenticated_dashboard_routes
      heuristic:
        - marketing_pages_and_dashboard

  public_marketing_site:
    label: Public marketing site
    description: Public content-heavy pages and marketing flows.
    detection_signals:
      structural:
        - blade_marketing_views
        - marketing_routes
      heuristic:
        - hero_pricing_contact_terms

  notifications_heavy:
    label: Notifications-heavy
    description: Frequent notification workflow and messaging orchestration.
    detection_signals:
      structural:
        - notifications_dir
        - notification_classes
      heuristic:
        - notify_terms
        - mail_sms_push_mix

  external_integrations_heavy:
    label: External integrations-heavy
    description: Significant third-party APIs/webhooks/provider logic.
    detection_signals:
      structural:
        - webhooks_routes
        - integration_services
      heuristic:
        - provider_terms
        - http_client_terms

  file_upload_storage_heavy:
    label: File upload/storage-heavy
    description: Project contains substantial upload/archive/document storage flows.
    detection_signals:
      structural:
        - upload_controllers
        - storage_services
      heuristic:
        - upload_route_terms
        - archive_processing_terms

team_expectations:
  thin_controllers:
    label: Thin controllers enforced
    default: false
  form_requests_expected:
    label: FormRequests expected
    default: false
  services_actions_expected:
    label: Services/Actions expected
    default: false
  repositories_expected:
    label: Repository pattern expected
    default: false
  resources_expected:
    label: API resources expected
    default: false
  dto_data_objects_preferred:
    label: DTO/Data objects preferred
    default: false

rule_behavior:
  controller-business-logic:
    defaults:
      enabled: true
      severity: medium
      thresholds:
        min_confidence: 0.62
        min_cyclomatic: 10
        min_loc: 80
    by_profile:
      mvc:
        severity: medium
        thresholds:
          min_confidence: 0.7
          min_cyclomatic: 11
          min_loc: 90
      layered:
        severity: high
        thresholds:
          min_confidence: 0.58
          min_cyclomatic: 7
          min_loc: 55
      modular:
        severity: high
        thresholds:
          min_confidence: 0.58
          min_cyclomatic: 7
          min_loc: 55
      api-first:
        severity: high
        thresholds:
          min_confidence: 0.6
          min_cyclomatic: 8
          min_loc: 60
    by_project_type:
      saas_platform:
        severity: high
      clinic_erp_management:
        severity: high
      realtime_game_control_platform:
        severity: high
      internal_admin_system:
        thresholds:
          min_cyclomatic: 10
          min_loc: 85
      api_backend:
        severity: high
      portal_based_business_app:
        severity: high
    by_capability:
      multi_tenant:
        severity: high
      multi_role_portal:
        severity: high
      billing:
        severity: high
      realtime:
        severity: high
    by_team_expectation:
      thin_controllers:
        severity: high
        thresholds:
          min_cyclomatic: 6

  controller-query-direct:
    defaults:
      enabled: true
      severity: medium
      thresholds:
        max_queries_per_method: 1
    by_profile:
      mvc:
        severity: low
        thresholds:
          max_queries_per_method: 2
      layered:
        severity: high
        thresholds:
          max_queries_per_method: 0
      modular:
        severity: high
        thresholds:
          max_queries_per_method: 0
      api-first:
        severity: high
        thresholds:
          max_queries_per_method: 0
    by_team_expectation:
      thin_controllers:
        severity: high
        thresholds:
          max_queries_per_method: 0
      repositories_expected:
        severity: high
        thresholds:
          max_queries_per_method: 0

  fat-controller:
    defaults:
      enabled: true
      severity: medium
      thresholds:
        max_method_loc: 55
        max_queries: 2
        max_validations: 0
        min_problem_count: 2
    by_profile:
      mvc:
