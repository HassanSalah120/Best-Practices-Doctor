          min_problem_count: 2
      modular:
        severity: high
        thresholds:
          max_method_loc: 45
          max_queries: 1
          min_problem_count: 2
      api-first:
        severity: high
        thresholds:
          max_method_loc: 50
          max_queries: 1
          min_problem_count: 2
    by_team_expectation:
      thin_controllers:
        severity: high
        thresholds:
          max_method_loc: 40
          max_queries: 1
          min_problem_count: 2
      services_actions_expected:
        severity: high
        thresholds:
          max_method_loc: 45
