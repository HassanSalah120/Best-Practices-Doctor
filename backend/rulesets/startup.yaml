scan:
  ignore:
  - vendor/**
  - node_modules/**
  - storage/**
  - bootstrap/cache/**
  - bootstrap/ssr/**
  - public/build/**
  - .git/**
  - tests/**
  - database/seeders/**
  - database/seeds/**
  max_file_size_kb: 500
  max_files: 5000
scoring:
  weights:
    security: 0.25
    performance: 0.15
    laravel_best_practice: 0.2
    maintainability: 0.2
    complexity: 0.2
  severity_penalties:
    critical: 40.0
    high: 15.0
    medium: 5.0
    low: 0.75
    info: 0.25
  cap_low_info_per_file_rule: true
