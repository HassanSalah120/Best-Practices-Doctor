name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-launcher:
    name: macOS launcher and Rust check
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate macOS scripts
        run: |
          bash -n scripts/macos/setup.sh
          bash -n scripts/macos/start.sh
          bash -n scripts/macos/build.sh
          node --check scripts/platform-runner.mjs
          bash scripts/macos/setup.sh --skip-node
          node scripts/platform-runner.mjs start --check --skip-setup
      - name: Check Tauri Rust application on macOS
        run: cargo check --manifest-path tauri/src-tauri/Cargo.toml

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Tree-sitter's native grammar wheels are unstable when repeatedly created
    # across Linux worker threads. CI favors deterministic coverage; production
    # users can still configure BPD_SCAN_WORKERS for their platform.
    env:
      BPD_SCAN_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt
      - name: Install backend
        run: python -m pip install -e "./backend[dev]"
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  web:
    name: Frontend and MCP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            bpdoctor-mcp/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Test frontend
        run: npm test --prefix frontend
      - name: Lint frontend
        run: npm run lint --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend
      - name: Install MCP dependencies
        run: npm ci --prefix bpdoctor-mcp
      - name: Build MCP bridge
        run: npm run build --prefix bpdoctor-mcp
