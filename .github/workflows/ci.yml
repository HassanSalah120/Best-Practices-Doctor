name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          cd backend
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint backend (ruff)
        run: |
          cd backend
          python -m ruff check .
      - name: Security scan (bandit)
        run: |
          cd backend
          pip install bandit
          python -m bandit -r . -x ./tests
      - name: Type check (mypy)
        run: |
          cd backend
          python -m mypy .
      - name: Pytest
        run: |
          cd backend
          python -m pytest -q

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Frontend tests
        run: |
          cd frontend
          npm run test
      - name: Build
        run: |
          cd frontend
          npm run build
