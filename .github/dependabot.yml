version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /bpdoctor-mcp
    schedule:
      interval: weekly
    groups:
      mcp-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /tauri
    schedule:
      interval: weekly
    groups:
      tauri-js-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /tauri/src-tauri
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
